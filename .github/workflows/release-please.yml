name: Release Please

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types:
      - completed

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Create or update release PR
        id: release
        uses: googleapis/release-please-action@v4.4.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Fail when no release PR is created
        if: ${{ steps.release.outputs.prs_created != 'true' && steps.release.outputs.releases_created != 'true' }}
        run: |
          echo "::error::Release Please did not create a release PR or release."
          echo "::error::Most common cause: commit messages are not Conventional Commits (e.g. feat:, fix:)."
          exit 1
